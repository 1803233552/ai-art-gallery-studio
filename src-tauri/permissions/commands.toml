[[permission]]
identifier = "allow-save-image-file"
description = "Allows saving generated images through a native file dialog."
commands.allow = ["save_image_file"]

[[permission]]
identifier = "allow-native-image-edit"
description = "Allows the desktop webview to call the native image edit HTTP bridge."
commands.allow = ["native_image_edit"]

[[permission]]
identifier = "allow-open-registration-url"
description = "Allows opening the fixed registration URL in the system browser."
commands.allow = ["open_registration_url"]
