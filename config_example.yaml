# ==========================================================
#  AI 创意工坊 - 配置文件
#  修改后重启服务生效：./manage.sh → 2(重启)
# ==========================================================


# ----------------------------------------------------------
#  站点信息 —— 控制网页上显示的名称、图标、标题
# ----------------------------------------------------------
site:
  icon: "✨"                # 浏览器标签页和导航栏左侧的图标，可以填 emoji 或图片 URL
  name: "浅夜の梦 - AI绘图平台"         # 导航栏显示的站点名称

  # 各页面的浏览器标签页标题（<title> 标签）
  titles:
    home: "浅夜の梦"
    play: "工作台 - 浅夜の梦"
    docs: "API 开发文档 - 浅夜の梦"
    gallery: "图片广场 - 浅夜の梦"
    admin: "管理后台 - 浅夜の梦"


# ----------------------------------------------------------
#  服务器 —— 监听地址和端口
# ----------------------------------------------------------
server:
  host: "0.0.0.0"           # 监听地址，0.0.0.0 = 所有网卡，127.0.0.1 = 仅本机
  port: 8100                # 监听端口，启动后访问 http://你的IP:8100
  debug: false              # 调试模式，生产环境务必设为 false

# ----------------------------------------------------------
#  日志 —— 按天轮换，自动清理过期日志
# ----------------------------------------------------------
logging:
  # 日志文件存储目录（相对路径或绝对路径，规则同 storage_path）
  dir: "./logs"

  # 日志级别：DEBUG / INFO / WARNING / ERROR
  level: "INFO"

  # 日志保留天数，超过后自动删除旧日志文件
  keep_days: 30

  # 单个日志文件最大体积，超出后会在当天继续切分，避免单日日志无限变大
  max_file_mb: 10

  # 最多保留多少个历史日志文件（同时还会受 keep_days 限制）
  max_files: 30

  # 后台清理任务的遍历间隔（单位：分钟），默认 60 分钟
  # 每隔该时间检查一次是否有过期的云缓存需要删除
  cleanup_interval_minutes: 60
  
# ----------------------------------------------------------
#  API 节点 —— 用户在工作台下拉框中看到的可选节点
#  格式：  "显示名称": "节点地址"
#  可以配置多个，用户自行选择连接哪一个
# ----------------------------------------------------------
api_nodes:
  "IP直连（当前后端请求）": "127.0.0.1:3000"
  

# ----------------------------------------------------------
#  允许使用的模型 —— 只有列在这里的模型才会出现在工作台选项中
#  如果注释掉整个列表，则允许所有模型（均使用默认配置）
#
#  每个模型支持以下属性：
#    name      (必填) 模型名称，需要与 API 返回的 model id 匹配
#    ref_image (可选) 是否允许上传参考图做图生图，默认 true
#    endpoint  (可选) 请求路径，可选值：
#                     images     → /v1/images/generations（默认，适用于大多数模型）
#                     chat       → /v1/chat/completions（适用于 Gemini 等多模态模型）
#
#  也兼容旧的纯字符串写法（等价于 { name: "xxx", ref_image: true, endpoint: "images" }）
# ----------------------------------------------------------
allowed_models:
  - name: "gemini-3.1-flash-image"
    ref_image: true            # Gemini 支持图生图，走 chat/completions 路径
    endpoint: "chat"
    inject_ratio: true         # Gemini 需要在 prompt 里注入比例描述
    plain_content: false       # Gemini 支持数组格式 content（默认）

  - name: "gpt-image-2"
    ref_image: true
    endpoint: "images"

  - name: "gpt-image-2-2k"
    ref_image: true
    endpoint: "images"

  - name: "gpt-image-2-4k"
    ref_image: true
    endpoint: "images"

  - name: "grok-imagine-image-lite"
    ref_image: false           # grok 图像模型暂不支持参考图
    endpoint: "chat"
    inject_ratio: false        # grok 自带尺寸能力，不需要在 prompt 里注入比例
    plain_content: true        # grok 只接受纯字符串 content，不接受数组


# ----------------------------------------------------------
#  请求模式 —— 图片生成请求的走向
#    frontend  →  前端浏览器直接请求 API 节点（推荐，不消耗服务器带宽）
#    backend   →  浏览器 → 你的服务器 → API 节点（适合节点需要服务端鉴权的情况）
# ----------------------------------------------------------
request_mode: "backend"


# ----------------------------------------------------------
#  图片广场 —— 用户上传/浏览/点赞图片的社区功能
# ----------------------------------------------------------
gallery:
  enabled: true              # 是否启用广场功能，false = 隐藏广场入口

  # 图片文件存储路径
  #   相对路径 → 相对于项目根目录，如 ./gallery_images
  #   绝对路径 → 如 /data/huitu-data/gallery_images（推荐服务器部署时使用）
  storage_path: "/home/huitu/huitu-data"

  page_size: 24              # 广场每页显示多少张图片
  default_sort: "likes"      # 默认排序方式：likes(按点赞) / newest(按时间)
  max_image_size: 10         # 单张图片最大体积，单位 MB
  daily_upload_limit: 50     # 每个用户每天最多上传几张，0 = 不限制
  dedup: true                # 图片去重：true = 同一张图不能重复上传
  daily_comment_limit: 100   # 每个用户每天最多评论几条，0 = 不限制

# ----------------------------------------------------------
#  绘图历史 —— 已登录用户的绘图记录临时存储到服务器
#  未登录用户的历史仍然存储在浏览器本地
# ----------------------------------------------------------
history:
  # 是否开启登录用户的服务器端历史存储，false = 所有用户都只存浏览器本地
  enabled: true

  # 临时图片存储目录（服务器磁盘）
  storage_path: "/home/huitu/huitu-linshi"

  # 保留时长（单位：分钟），超过此时间自动清理
  # 默认 14400 分钟 = 10 天
  retention_minutes: 14400

  # 每个用户最多保存多少张临时图片，超出后自动删除最旧的
  max_images_per_user: 500

# ----------------------------------------------------------
#  NewAPI 鉴权 —— 对接 NewAPI / OneAPI 的用户登录体系
#  用户在广场登录时，会用这个地址验证 API Key 身份
# ----------------------------------------------------------
newapi:
  base_url: "https://newapi.qianye.host"   # 你的 NewAPI 服务地址

  # 管理员用户 ID 列表（NewAPI 中的 user id）
  # 这些用户登录广场后拥有管理权限（删图、封禁等）
  admin_user_ids:
    - 1


# ----------------------------------------------------------
#  管理后台 —— 独立的管理员登录，不依赖 NewAPI
# ----------------------------------------------------------
admin:
  # 后台访问路径，默认 /admin
  # 生产环境建议改成不容易猜到的路径，如 /my-secret-admin-2025
  path: "/admin"

  username: "xiaoqian"          # 管理员用户名
  password: "change-me"       # 管理员密码（请务必修改！）


# ----------------------------------------------------------
#  公告系统 —— 支持 Markdown 语法，修改后自动生效无需重启
# ----------------------------------------------------------
announcements:
  enabled: true             # 是否启用公告，true = 显示，false = 隐藏

  # 各页面的公告内容，留空 "" = 该页面不显示公告
  home: ""
  play: |
   GPT审查很严，失败的往往都是图片提示词有问题，任何侵权、涉及到可能真实人物的名字都会被拒绝生成图片。
   请多多尝试，如果真的是因为服务器号池空了导致的失败可以群里向我反映。
   提示词参考网站：https://veosoragen.com/
  docs: ""
  gallery: ""
  


# ----------------------------------------------------------
#  数据库 —— 存储用户数据、广场图片信息、点赞/评论等
# ----------------------------------------------------------
database:
  # 数据库类型：sqlite（轻量，无需安装） 或 mysql
  type: "mysql"

  # SQLite WAL 日志维护：限制 -wal 文件长期增长（type: sqlite 时生效）
  sqlite_journal_limit_mb: 32
  sqlite_wal_autocheckpoint_pages: 1000

  # ---- SQLite 配置（type: sqlite 时使用）----
  # 数据库文件路径，规则同 storage_path：
  #   相对路径 → ./data/huitu.db
  #   绝对路径 → /data/huitu-data/huitu.db
  # path: "./data/huitu.db"

  # ---- MySQL 配置（type: mysql 时取消下面的注释）----
  host: "127.0.0.1"
  port: 3306
  user: ""
  password: ""
  database: ""


# ----------------------------------------------------------
#  安全密钥 —— 首次启动自动生成，用于 Cookie/Token 签名
#  ⚠️ 请勿删除，删除后所有用户登录状态会失效
# ----------------------------------------------------------
secret_key: ""
